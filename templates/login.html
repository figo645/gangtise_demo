<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>冈底斯系统锁定</title>
<link rel="stylesheet" href="/static/css/style.css">
<style>
body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at top,#1A2E45 0%,#0D1B2A 55%,#08111d 100%);font-family:var(--font-main);color:var(--white)}
.lock-overlay{width:min(92vw,420px);background:rgba(26,46,69,0.92);border:1px solid rgba(200,169,110,0.22);border-radius:18px;padding:28px;box-shadow:0 24px 80px rgba(0,0,0,.45);backdrop-filter:blur(14px)}
.lock-title{font-size:24px;font-weight:700;color:var(--gold);letter-spacing:2px;margin-bottom:8px}
.lock-desc{font-size:13px;color:var(--gray-400);line-height:1.7;margin-bottom:20px}
.lock-form{display:flex;flex-direction:column;gap:12px}
.lock-input{width:100%;background:#0D1B2A;border:1px solid rgba(200,169,110,0.2);border-radius:10px;padding:12px 14px;color:var(--white);font-size:15px;outline:none}
.lock-input:focus{border-color:var(--gold)}
.lock-error{background:rgba(231,76,60,.12);border:1px solid rgba(231,76,60,.25);color:#ff8d80;border-radius:10px;padding:10px 12px;font-size:13px}
.lock-note{font-size:11px;color:var(--gray-400);margin-top:10px}
.btn-lock{width:100%;padding:12px 16px;border:none;border-radius:10px;background:linear-gradient(135deg,var(--gold-dark),var(--gold-light));color:var(--navy);font-weight:700;cursor:pointer}
</style>
</head>
<body>
  <div class="lock-overlay">
    <div class="lock-title">系统已锁定</div>
    <div class="lock-desc">请输入访问密码后进入系统。</div>
    {% if error %}<div class="lock-error">{{ error }}</div>{% endif %}
    <form class="lock-form" method="post" action="/unlock">
      <input class="lock-input" type="password" name="password" placeholder="请输入密码" autofocus required>
      <input type="hidden" name="next" value="{{ next_target }}">
      <button class="btn-lock" type="submit">进入系统</button>
    </form>
    <div class="lock-note">仅授权用户可访问。</div>
  </div>
</body>
</html>
